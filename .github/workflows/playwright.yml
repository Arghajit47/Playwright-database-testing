name: Playwright Database Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Set up Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          npm ci

      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install

      # Debug: Show host being used (Sanitized)
      - name: Debug Connection Host
        run: |
          if [[ -n "$SUPABASE_DB_URL" && "$SUPABASE_DB_URL" == *"@"* ]]; then
            echo "Active Host: $(echo $SUPABASE_DB_URL | sed -e 's/.*@//' -e 's/:.*//')"
          else
            echo "Active Host: <host-unavailable>"
          fi

      # Run Playwright tests
      - name: Run Playwright tests
        run: npx playwright test

      - name: Generate Pulse Report (Static and Dynamic)
        run: |
          npm run pulse-report
          npm run pulse-static-report  

      # Upload Playwright test reports
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: pulse-report
          path: pulse-report/
          retention-days: 30